<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thèmes Portfolio — 20 variantes</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #0a0d12; color: #e0e6ed; padding: 2rem; }
h1 { font-size: 1.6rem; font-weight: 700; color: #fff; margin-bottom: 0.4rem; }
p.sub { color: #6b7f94; font-size: 0.9rem; margin-bottom: 2rem; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
.card { border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); transition: transform 0.15s; }
.card:hover { transform: translateY(-3px); }
.preview { height: 100px; display: flex; align-items: center; justify-content: center; gap: 12px; padding: 0 20px; }
.p-dot { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; }
.p-bar { flex: 1; height: 6px; border-radius: 3px; opacity: 0.25; background: white; }
.p-btn { padding: 4px 14px; border-radius: 5px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; flex-shrink: 0; }
.p-txt { font-size: 13px; font-family: monospace; flex-shrink: 0; }
.info { background: #111820; padding: 14px 16px; border-top: 1px solid rgba(255,255,255,0.06); }
.name { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 4px; }
.hex { font-size: 11px; font-family: monospace; color: #6b7f94; margin-bottom: 10px; }
.vars { background: #0a0d12; border-radius: 8px; padding: 10px 12px; font-size: 10.5px; font-family: monospace; color: #8aaccc; line-height: 1.8; margin-bottom: 10px; white-space: pre; overflow-x: auto; }
.copy { width: 100%; padding: 7px; border: 1px solid rgba(255,255,255,0.12); border-radius: 7px; background: transparent; color: #8aaccc; font-size: 12px; cursor: pointer; transition: background 0.15s; }
.copy:hover { background: rgba(255,255,255,0.06); }
.copy.ok { color: #4ade80; border-color: #4ade8066; }
footer { text-align: center; color: #3d5068; font-size: 12px; margin-top: 3rem; }
</style>
</head>
<body>
<h1>🎨 Thèmes Portfolio — 20 variantes</h1>
<p class="sub">Clique sur "Copier" pour obtenir les variables CSS complètes à coller dans ton portfolio.</p>
<div class="grid" id="grid"></div>
<footer>Portfolio BTS SIO SISR — Variables CSS prêtes à l'emploi</footer>

<script>
const themes = [
  { name: "Cyber Cyan (défaut)", accent: "#00d4ff", accent2: "#0099cc", laccent: "#0099cc", bg: "#080c10", surface: "#121820", text: "#e8edf2", muted: "#6b7f94", lbg: "#f0f4f8", ltxt: "#0d1a26" },
  { name: "Neon Violet", accent: "#9b5de5", accent2: "#7c3fd1", laccent: "#7c3fd1", bg: "#08070f", surface: "#110f1e", text: "#ede8f5", muted: "#7a6e9a", lbg: "#f5f0ff", ltxt: "#1a0d33" },
  { name: "Matrix Green", accent: "#00ff87", accent2: "#00c860", laccent: "#00a855", bg: "#050e08", surface: "#0d1a10", text: "#e0f5e8", muted: "#5a9468", lbg: "#f0fff5", ltxt: "#062e14" },
  { name: "Ember Orange", accent: "#ff6b2b", accent2: "#d44a10", laccent: "#d44a10", bg: "#0e0805", surface: "#1c1008", text: "#f5ede8", muted: "#9a6a54", lbg: "#fff5f0", ltxt: "#2e0e06" },
  { name: "Rose Gold", accent: "#ff6eb0", accent2: "#d44a8a", laccent: "#d44a8a", bg: "#0f080c", surface: "#1e1015", text: "#f5e8ef", muted: "#9a6480", lbg: "#fff0f6", ltxt: "#2e0618" },
  { name: "Acid Yellow", accent: "#d4ff00", accent2: "#aad400", laccent: "#8aaa00", bg: "#0c0e05", surface: "#181b08", text: "#f0f5e0", muted: "#7a8a50", lbg: "#f8fff0", ltxt: "#1a2006" },
  { name: "Ice Blue", accent: "#48c9f0", accent2: "#1aaad4", laccent: "#0a88bb", bg: "#060b10", surface: "#0e1620", text: "#e0edf5", muted: "#507a94", lbg: "#f0f8ff", ltxt: "#061828" },
  { name: "Magenta Flux", accent: "#f000ff", accent2: "#c000d0", laccent: "#b000bb", bg: "#0e050e", surface: "#1c0d1c", text: "#f5e0f5", muted: "#8a508a", lbg: "#fff0ff", ltxt: "#280528" },
  { name: "Sunset Red", accent: "#ff3b3b", accent2: "#dd1515", laccent: "#cc1515", bg: "#0f0505", surface: "#1e0a0a", text: "#f5e8e8", muted: "#9a5454", lbg: "#fff5f5", ltxt: "#2e0505" },
  { name: "Arctic White", accent: "#ffffff", accent2: "#cccccc", laccent: "#444c55", bg: "#07090c", surface: "#10151c", text: "#e8ecf0", muted: "#6b7a8a", lbg: "#f8f9fa", ltxt: "#0a0e12" },
  { name: "Deep Gold", accent: "#ffd700", accent2: "#ccaa00", laccent: "#cc9900", bg: "#0c0900", surface: "#1a1400", text: "#f5f0e0", muted: "#8a7840", lbg: "#fffdf0", ltxt: "#2a2000" },
  { name: "Toxic Lime", accent: "#aaff00", accent2: "#88cc00", laccent: "#66cc00", bg: "#050c00", surface: "#0d1a00", text: "#eaf5e0", muted: "#6a8a40", lbg: "#f5fff0", ltxt: "#102000" },
  { name: "Ocean Teal", accent: "#00d4aa", accent2: "#00aa88", laccent: "#009975", bg: "#020e0e", surface: "#051a1a", text: "#e0f5f2", muted: "#409480", lbg: "#f0fffc", ltxt: "#001e1a" },
  { name: "Infrared", accent: "#ff4500", accent2: "#dd2a00", laccent: "#cc2a00", bg: "#0e0200", surface: "#1e0500", text: "#f5ebe0", muted: "#9a6040", lbg: "#fff5f0", ltxt: "#2e0a00" },
  { name: "Cobalt Blue", accent: "#2255ff", accent2: "#0033dd", laccent: "#0033cc", bg: "#02040e", surface: "#050a1e", text: "#e0e5f5", muted: "#4050a0", lbg: "#f0f2ff", ltxt: "#000a2e" },
  { name: "Neon Pink", accent: "#ff0080", accent2: "#dd0066", laccent: "#cc0060", bg: "#0e0008", surface: "#1e0010", text: "#f5e0ec", muted: "#9a4070", lbg: "#fff0f8", ltxt: "#2e0018" },
  { name: "Plasma Purple", accent: "#bb44ff", accent2: "#9900ee", laccent: "#8800ee", bg: "#080010", surface: "#100020", text: "#ede0f5", muted: "#7040a0", lbg: "#f8f0ff", ltxt: "#180028" },
  { name: "Retro Amber", accent: "#ff9500", accent2: "#dd7700", laccent: "#cc6600", bg: "#0e0800", surface: "#1e1200", text: "#f5eee0", muted: "#9a7040", lbg: "#fffaf0", ltxt: "#2e1800" },
  { name: "Glacial Mint", accent: "#44ffcc", accent2: "#00ddaa", laccent: "#00bb88", bg: "#030e0a", surface: "#071a12", text: "#e0f5ee", muted: "#40906c", lbg: "#f0fffa", ltxt: "#001a10" },
  { name: "Chrome Silver", accent: "#cccccc", accent2: "#aaaaaa", laccent: "#666666", bg: "#080808", surface: "#141414", text: "#e8e8e8", muted: "#707070", lbg: "#f5f5f5", ltxt: "#111111" },
];

function r(hex, a) {
  const n = parseInt(hex.replace('#',''), 16);
  return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`;
}

function css(t) {
  return `:root {
    --bg: ${t.bg};
    --bg2: ${shadeHex(t.bg, 8)};
    --surface: ${t.surface};
    --surface2: ${shadeHex(t.surface, 8)};
    --accent: ${t.accent};
    --accent2: ${t.accent2};
    --accent-glow: ${r(t.accent, 0.15)};
    --text: ${t.text};
    --text-muted: ${t.muted};
    --text-dim: ${t.muted}88;
    --border: ${r(t.accent, 0.12)};
    --border2: rgba(255,255,255,0.06);
    --font-display: 'Bebas Neue', sans-serif;
    --font-mono: 'Space Mono', monospace;
    --font-body: 'DM Sans', sans-serif;
}
[data-theme="light"] {
    --bg: ${t.lbg};
    --bg2: ${t.lbg}dd;
    --surface: #ffffff;
    --surface2: #d8e2ee;
    --accent: ${t.laccent};
    --accent2: ${t.laccent}cc;
    --accent-glow: ${r(t.laccent, 0.12)};
    --text: ${t.ltxt};
    --text-muted: ${t.ltxt}99;
    --text-dim: ${t.ltxt}55;
    --border: ${r(t.laccent, 0.2)};
    --border2: rgba(0,0,0,0.07);
}`;
}

function shadeHex(hex, amount) {
  let n = parseInt(hex.replace('#',''), 16);
  let r = Math.min(255, (n>>16&255)+amount);
  let g = Math.min(255, (n>>8&255)+amount);
  let b = Math.min(255, (n&255)+amount);
  return '#' + [r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}

const grid = document.getElementById('grid');
themes.forEach((t, i) => {
  const c = document.createElement('div');
  c.className = 'card';
  const snippet = `:root {\n    --accent: ${t.accent};\n    --accent2: ${t.accent2};\n    --bg: ${t.bg};\n    --surface: ${t.surface};\n    /* ... */\n}`;
  c.innerHTML = `
    <div class="preview" style="background:${t.bg}">
      <div class="p-dot" style="background:${t.accent}"></div>
      <div class="p-bar"></div>
      <div class="p-btn" style="background:${t.accent};color:${t.bg}">MENU</div>
      <div class="p-txt" style="color:${t.text}">&lt;/&gt;</div>
    </div>
    <div class="info">
      <div class="name">${i+1}. ${t.name}</div>
      <div class="hex">accent: ${t.accent} · bg: ${t.bg}</div>
      <pre class="vars">${snippet}</pre>
      <button class="copy" data-i="${i}">📋 Copier les variables CSS complètes</button>
    </div>`;
  grid.appendChild(c);
});

document.querySelectorAll('.copy').forEach(btn => {
  btn.onclick = function() {
    navigator.clipboard.writeText(css(themes[+this.dataset.i]));
    this.textContent = '✓ Copié !';
    this.classList.add('ok');
    setTimeout(() => {
      this.textContent = '📋 Copier les variables CSS complètes';
      this.classList.remove('ok');
    }, 2000);
  };
});
</script>
</body>
</html>
